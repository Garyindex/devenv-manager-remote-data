name: refresh online data

on:
  schedule:
    - cron: "17 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: refresh-online-data
  cancel-in-progress: false

jobs:
  refresh-metadata:
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm run validate
      - run: npm run catalog
      - run: npm run identities
      - run: npm run policy
      - run: npm run refresh:metadata
      - run: npm run manifest
      - run: npm run validate
      - name: Commit refreshed data
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data schemas scripts core providers .github/workflows package.json README.md DATA_CONTRACT.md
          if (git diff --cached --quiet) {
            Write-Host "No data changes to commit."
          } else {
            git commit -m "Refresh online development environment data"
            git push
          }
